<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Warning Signs of Teen Substance Use</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  background: #000 !important;
  overflow-x: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  display: flex;
  justify-content: center;
}

.page {
  width: 100%;
  max-width: 1024px;
  background: #000;
  line-height: 0;
}

img {
  display: block;
  width: 100%;
  height: auto;
  border: 0;
  vertical-align: bottom;
}

/* HERO: one clean horizontal strip */
.hero-row {
  display: grid;
  grid-template-columns: 50% 50%;
  width: 100%;
  background: #000;
  line-height: 0;
}

.hero-row img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* WARNING GRID */
.warnings-grid {
  display: grid;
  grid-template-columns: 50% 50%;
  width: 100%;
  background: #000;
  line-height: 0;
}

.footer-img {
  width: 100%;
  background: #000;
  line-height: 0;
}

/* PHONE PORTRAIT */
@media (max-width: 700px) and (orientation: portrait) {
  .hero-row {
    grid-template-columns: 1fr;
  }

  .warnings-grid {
    grid-template-columns: 1fr;
  }
}

/* PHONE LANDSCAPE / HORIZONTAL VIEW */
@media (max-width: 950px) and (orientation: landscape) {
  body {
    align-items: flex-start;
  }

  .page {
    max-width: 100vw;
  }

  .hero-row {
    grid-template-columns: 50% 50%;
  }

  .warnings-grid {
    grid-template-columns: 50% 50%;
  }
}
</style>
</head>

<body>

<main class="page">

  <section class="hero-row">
    <img src="/warning/warningheroleft.jpeg" alt="Warning signs of teen substance use">
    <img src="/warning/warningheroright.jpeg" alt="Teen sitting alone">
  </section>

  <section class="warnings-grid">
    <img src="/warning/warning1.jpeg" alt="Mood changes">
    <img src="/warning/warning2.jpeg" alt="Sleep changes">

    <img src="/warning/warning3.jpeg" alt="School and activity changes">
    <img src="/warning/warning4.jpeg" alt="Social changes">

    <img src="/warning/warning5.jpeg" alt="Secretive behavior">
    <img src="/warning/warning6.jpeg" alt="Risky or unusual behavior">

    <img src="/warning/warning7.jpeg" alt="Physical changes">
    <img src="/warning/warning8.jpeg" alt="Signs to look for">
  </section>

  <section class="footer-img">
    <img src="/warning/footer.jpeg" alt="Emergency resources">
  </section>

</main>

</body>
</html>
