<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Warning Signs of Teen Substance Use</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  background: #000 !important;
  overflow-x: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  display: flex;
  justify-content: center;
}

/* back button – improved for landscape */
.back-link {
  position: sticky;
  top: 16px;
  left: 16px;
  z-index: 100;
  display: inline-block;
  margin: 16px 0 0 16px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  padding: 8px 18px;
  border-radius: 40px;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  transition: 0.2s ease;
  width: fit-content;
  letter-spacing: -0.2px;
}

.back-link:hover {
  background: #e21b23;
  border-color: #e21b23;
  color: white;
}

.page {
  width: 100%;
  max-width: 1024px;
  background: #000;
  line-height: 0;
  position: relative;
}

img {
  display: block;
  width: 100%;
  height: auto;
  border: 0;
  vertical-align: bottom;
}

/* HERO: two columns side by side */
.hero-row {
  display: grid;
  grid-template-columns: 50% 50%;
  width: 100%;
  background: #000;
  line-height: 0;
}

.hero-row img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* WARNING GRID – two columns */
.warnings-grid {
  display: grid;
  grid-template-columns: 50% 50%;
  width: 100%;
  background: #000;
  line-height: 0;
}

.footer-img {
  width: 100%;
  background: #000;
  line-height: 0;
  margin: 0;
  padding: 0;
}

/* reset any extra spacing */
body, .page, .footer-img, .warnings-grid, .hero-row {
  margin: 0;
  padding: 0;
}

/* Portrait phones: stack hero and warnings */
@media (max-width: 700px) and (orientation: portrait) {
  .hero-row {
    grid-template-columns: 1fr;
  }
  .warnings-grid {
    grid-template-columns: 1fr;
  }
  .back-link {
    top: 10px;
    left: 10px;
    font-size: 0.8rem;
    padding: 6px 14px;
  }
}

/* Landscape view fix for phones and small tablets */
@media (max-width: 950px) and (orientation: landscape) {
  html, body {
    overflow-x: auto;
  }
  body {
    align-items: flex-start;
  }
  .page {
    max-width: 100%;
    width: 100%;
  }
  /* keep hero side by side (50/50) */
  .hero-row {
    grid-template-columns: 50% 50%;
  }
  /* warnings stay two columns – looks great in landscape */
  .warnings-grid {
    grid-template-columns: 50% 50%;
  }
  /* back button slightly smaller but still accessible */
  .back-link {
    top: 12px;
    left: 12px;
    font-size: 0.75rem;
    padding: 6px 12px;
  }
}

/* Extra small landscape (like 480px height) - ensure no clipping */
@media (max-height: 450px) and (orientation: landscape) {
  .back-link {
    position: sticky;
    margin: 8px 0 0 12px;
  }
  .hero-row img, .warnings-grid img {
    max-height: 70vh;
    object-fit: contain;
  }
}
</style>
</head>
<body>

<main class="page">
  <a href="parents.html" class="back-link">← Back to Parents</a>

  <section class="hero-row">
    <img src="/warning/warningheroleft.jpeg" alt="Warning signs of teen substance use">
    <img src="/warning/warningheroright.jpeg" alt="Teen sitting alone">
  </section>

  <section class="warnings-grid">
    <img src="/warning/warning1.jpeg" alt="Mood changes">
    <img src="/warning/warning2.jpeg" alt="Sleep changes">

    <img src="/warning/warning3.jpeg" alt="School and activity changes">
    <img src="/warning/warning4.jpeg" alt="Social changes">

    <img src="/warning/warning5.jpeg" alt="Secretive behavior">
    <img src="/warning/warning6.jpeg" alt="Risky or unusual behavior">

    <img src="/warning/warning7.jpeg" alt="Physical changes">
    <img src="/warning/warning8.jpeg" alt="Signs to look for">
  </section>

  <section class="footer-img">
    <img src="/warning/footer.jpeg" alt="Emergency resources">
  </section>
</main>

</body>
</html>
