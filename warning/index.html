<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Warning Signs of Teen Substance Use</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100%;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  display: flex;
  justify-content: center;
}

.page {
  width: 100%;
  max-width: 1024px;
  background: #000;
  overflow: hidden;
}

img {
  display: block;
  width: 100%;
  height: auto;
}

/* TOP HERO: title panel left, teen image right */
.hero-row {
  display: grid;
  grid-template-columns: 65% 35%;
  gap: 0;
  background: #000;
}

.hero-left,
.hero-right {
  min-width: 0;
}

/* WARNING CARDS */
.warnings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  background: #000;
}

/* FOOTER */
.footer-img {
  background: #000;
}

/* Mobile: keep poster layout intact */
@media (max-width: 700px) {
  .page {
    width: 100%;
  }

  .hero-row {
    grid-template-columns: 65% 35%;
  }

  .warnings-grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>
<div class="page">

  <div class="hero-row">
    <img src="/warning/warningheroleft.jpeg" alt="Warning Signs of Teen Substance Use">
    <img src="/warning/warningheroright.jpeg" alt="Teen sitting alone">
  </div>

  <div class="warnings-grid">
    <img src="/warning/warning1.jpeg" alt="Mood changes">
    <img src="/warning/warning2.jpeg" alt="Sleep changes">

    <img src="/warning/warning3.jpeg" alt="School and activity changes">
    <img src="/warning/warning4.jpeg" alt="Social changes">

    <img src="/warning/warning5.jpeg" alt="Secretive behavior">
    <img src="/warning/warning6.jpeg" alt="Risky or unusual behavior">

    <img src="/warning/warning7.jpeg" alt="Physical changes">
    <img src="/warning/warning8.jpeg" alt="Signs to look for">
  </div>

  <div class="footer-img">
    <img src="/warning/footer.jpeg" alt="Emergency resources and support">
  </div>

</div>
</body>
</html>
