<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Warning signs of teen substance use — changes in mood, behavior, school, sleep, and social life. Free resources and crisis helplines.">
  <title>Warning Signs of Teen Substance Use | Parent Resource</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fefaf5;   /* soft cream background similar to original handout */
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      line-height: 1.4;
      color: #1f2937;
    }

    /* main container – mimics the layout of IMG_8119.png */
    .handout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.8rem 3rem;
      background: #ffffff;
      box-shadow: 0 0 0 1px #ede6dd, 0 12px 28px -8px rgba(0, 0, 0, 0.05);
    }

    /* hero row: left text image + right photo */
    .hero-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 2.2rem;
      align-items: center;
      background: transparent;
    }

    .hero-text-img {
      flex: 1.2;
      min-width: 240px;
    }

    .hero-photo-img {
      flex: 0.9;
      min-width: 200px;
    }

    .hero-text-img img,
    .hero-photo-img img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 20px;
      box-shadow: 0 10px 20px -6px rgba(0, 0, 0, 0.08);
      background: #fff;
    }

    /* Warning cards grid – exactly 2 columns, matching the original handout structure */
    .warnings-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.8rem;
      margin: 2rem 0 2rem 0;
    }

    /* each warning card wraps the .jpeg image to preserve original typography & look */
    .warning-card {
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.03);
      border: 1px solid #f0e5da;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .warning-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 26px -12px rgba(0, 0, 0, 0.12);
      border-color: #e0cfbf;
    }

    .warning-card img {
      width: 100%;
      height: auto;
      display: block;
      background: #fffdfa;
    }

    /* footer resource image (emergency contacts) */
    .resource-footer {
      margin: 2.2rem 0 1.2rem 0;
      border-radius: 32px;
      overflow: hidden;
      background: #f7efe7;
      box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.08);
      border: 1px solid #f0e2d4;
    }

    .resource-footer img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* extra text elements from original PNG (exact match for missing phrases) */
    .support-early {
      text-align: center;
      margin: 1.8rem 0 1rem;
      padding: 1rem 1rem;
      background: #fffaf5;
      border-radius: 64px;
      font-weight: 600;
      font-size: 1.05rem;
      color: #2f2e2a;
      border: 1px solid #f0e0d2;
    }

    .support-early strong {
      color: #bb2e3a;
    }

    .talk-line {
      text-align: center;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.2px;
      padding: 1rem 1.2rem;
      background: #fff3ec;
      border-radius: 60px;
      margin: 1rem 0 0.8rem;
      color: #2c241e;
      border-left: 5px solid #c12b2f;
      border-right: 5px solid #c12b2f;
    }

    .talk-line span {
      color: #c12b2f;
      font-weight: 900;
    }

    /* additional small note for consistency with original "Edit / Share" not required but keeps layout clean */
    .attribution-note {
      text-align: center;
      font-size: 0.7rem;
      color: #a0907e;
      margin-top: 2rem;
      border-top: 1px dashed #e9dfd3;
      padding-top: 1.5rem;
    }

    /* responsive: switch to single column on tablets/mobile */
    @media (max-width: 780px) {
      .handout {
        padding: 1.5rem;
      }
      .warnings-grid {
        grid-template-columns: 1fr;
        gap: 1.4rem;
      }
      .hero-row {
        flex-direction: column;
        gap: 1.2rem;
      }
      .hero-text-img, .hero-photo-img {
        flex: auto;
      }
      .talk-line {
        font-size: 1rem;
        padding: 0.8rem;
      }
    }

    @media (max-width: 500px) {
      .handout {
        padding: 1rem;
      }
      .support-early {
        font-size: 0.9rem;
      }
    }

    /* subtle print optimization */
    @media print {
      body {
        background: white;
      }
      .handout {
        box-shadow: none;
        padding: 0.2in;
      }
      .warning-card {
        break-inside: avoid;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
<div class="handout">
  
  <!-- HERO SECTION: Left text image (warningheroleft.jpeg) + right teenager image (warningheroright.jpeg) -->
  <div class="hero-row">
    <div class="hero-text-img">
      <img src="/warning/warningheroleft.jpeg" 
           alt="Warning signs of teen substance use: changes in behavior, mood, habits — start a conversation."
           loading="eager">
    </div>
    <div class="hero-photo-img">
      <img src="/warning/warningheroright.jpeg" 
           alt="Teen portrait — awareness and early support can save a life"
           loading="eager">
    </div>
  </div>

  <!-- WARNING SIGNS GRID: images exactly matching the original categories (8 images in correct order) 
       Order follows IMG_8119.png: 
       1. Mood Changes (warning1.jpeg)
       2. School & Activity Changes (warning3.jpeg)
       3. Secretive Behavior (warning5.jpeg)
       4. Physical Changes (warning7.jpeg)
       5. Sleep Changes (warning2.jpeg)
       6. Social Changes (warning4.jpeg)
       7. Risky or Unusual Behavior (warning6.jpeg)
       8. Signs to Look For (warning8.jpeg)
  -->
  <div class="warnings-grid">
    <!-- mood changes: warning1.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning1.jpeg" 
           alt="Mood changes: irritable, mood swings, sad or anxious, loss of interest in activities"
           loading="lazy">
    </div>
    <!-- school & activity changes: warning3.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning3.jpeg" 
           alt="School and activity changes: drop in grades, missing school, loss of motivation, incomplete assignments, losing interest in sports or clubs"
           loading="lazy">
    </div>
    <!-- secretive behavior: warning5.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning5.jpeg" 
           alt="Secretive behavior: more private or defensive, lying about plans, hiding things, excessive phone or social media use"
           loading="lazy">
    </div>
    <!-- physical changes: warning7.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning7.jpeg" 
           alt="Physical changes: bloodshot eyes or dilated pupils, weight change, appetite changes, poor hygiene, frequent colds"
           loading="lazy">
    </div>
    <!-- sleep changes: warning2.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning2.jpeg" 
           alt="Sleep changes: trouble falling or staying asleep, sleeping much more, tired or sluggish, odd sleep schedule"
           loading="lazy">
    </div>
    <!-- social changes: warning4.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning4.jpeg" 
           alt="Social changes: withdrawing from family and friends, new peer group, secretive about whereabouts, changes in online activity"
           loading="lazy">
    </div>
    <!-- risky or unusual behavior: warning6.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning6.jpeg" 
           alt="Risky or unusual behavior: taking unnecessary risks, decline in judgment, trouble at school or with law, unexplained need for money"
           loading="lazy">
    </div>
    <!-- signs to look for: warning8.jpeg -->
    <div class="warning-card">
      <img src="/warning/warning8.jpeg" 
           alt="Signs to look for: alcohol, vape or drug smell, possession of alcohol or drugs or paraphernalia, missing items or money, evidence like vapes, edibles, pills, rolling papers"
           loading="lazy">
    </div>
  </div>

  <!-- EMERGENCY RESOURCES & HELPLINES (footer.jpeg) 
       This image contains: Poison Control, SAMHSA, Crisis Text Line, 988 Lifeline, and "You are not alone" messaging -->
  <div class="resource-footer">
    <img src="/warning/footer.jpeg" 
         alt="Emergency resources: Poison Control 1-800-222-1222, SAMHSA National Helpline 1-800-662-HELP, Crisis Text Line text HOME to 741741, 988 Suicide & Crisis Lifeline — free 24/7 support. You are not alone."
         loading="lazy">
  </div>

  <!-- EXTRA TEXT to exactly match the original IMG_8119.png content (since footer.jpeg includes similar but not identical phrasing) 
       Original handout includes "YOU ARE NOT ALONE. Early conversations and support can make a big difference. Reach out for help." 
       and "TALK. LISTEN. SUPPORT. It could save a life." -->
  <div class="support-early">
    💙 <strong>YOU ARE NOT ALONE.</strong> Early conversations and support can make a big difference.<br>
    Reach out for help — you have the power to protect and guide.
  </div>

  <div class="talk-line">
    🗣️ <span>TALK. LISTEN. SUPPORT.</span> It could save a life.
  </div>

  <!-- subtle credit / footnote (no "Edit/Share" to keep clean but respects original aesthetic) -->
  <div class="attribution-note">
    ⚠️ Know the signs • Start the conversation • Help is 24/7
  </div>
</div>
</body>
</html>
