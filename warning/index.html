<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warning Signs of Teen Substance Use</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.4;
      color: #111;
    }

    /* simple container, no frames, no shadows */
    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      background: white;
    }

    /* images are just images — no borders, no frames, no extra styling */
    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* two‑column hero row (left text image + right photo) */
    .hero-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }

    .hero-left {
      flex: 1.2;
    }

    .hero-right {
      flex: 0.9;
    }

    /* warning signs grid: exactly two columns, plain images */
    .warnings-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin: 30px 0;
    }

    /* footer image area */
    .footer-img {
      margin: 30px 0 20px;
    }

    /* plain text sections to match the original PNG content */
    .you-are-not-alone {
      text-align: center;
      margin: 30px 0 20px;
      font-size: 1.1rem;
    }

    .helplines {
      text-align: center;
      margin: 20px 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .helplines strong {
      font-weight: 700;
    }

    .talk-line {
      text-align: center;
      font-weight: 700;
      font-size: 1.2rem;
      margin: 30px 0 20px;
    }

    .edit-share {
      text-align: center;
      color: #666;
      font-size: 0.8rem;
      margin-top: 30px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }

    @media (max-width: 700px) {
      .warnings-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .hero-row {
        flex-direction: column;
      }
      .page {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Hero row: left text image (warningheroleft.jpeg) + right teen photo (warningheroright.jpeg) -->
  <div class="hero-row">
    <div class="hero-left">
      <img src="/warning/warningheroleft.jpeg" alt="Warning signs of teen substance use">
    </div>
    <div class="hero-right">
      <img src="/warning/warningheroright.jpeg" alt="Teen portrait">
    </div>
  </div>

  <!-- Warning signs grid – images exactly as you saved them -->
  <div class="warnings-grid">
    <img src="/warning/warning1.jpeg" alt="Mood changes">
    <img src="/warning/warning3.jpeg" alt="School and activity changes">
    <img src="/warning/warning5.jpeg" alt="Secretive behavior">
    <img src="/warning/warning7.jpeg" alt="Physical changes">
    <img src="/warning/warning2.jpeg" alt="Sleep changes">
    <img src="/warning/warning4.jpeg" alt="Social changes">
    <img src="/warning/warning6.jpeg" alt="Risky or unusual behavior">
    <img src="/warning/warning8.jpeg" alt="Signs to look for">
  </div>

  <!-- Footer emergency image (footer.jpeg) -->
  <div class="footer-img">
    <img src="/warning/footer.jpeg" alt="Emergency resources: Poison Control, SAMHSA, Crisis Text Line, 988 Lifeline">
  </div>

  <!-- Additional text to exactly match the original IMG_8119.png content -->
  <div class="you-are-not-alone">
    <strong>YOU ARE NOT ALONE.</strong><br>
    Early conversations and support can make a big difference.<br>
    Reach out for help.
  </div>

  <div class="helplines">
    <strong>Poison Control</strong><br>
    1-800-222-1222<br><br>
    <strong>SAMHSA National Helpline</strong><br>
    1-800-662-HELP (4357)<br><br>
    <strong>Crisis Text Line</strong><br>
    Text HOME to 741741
  </div>

  <div class="talk-line">
    TALK. LISTEN. SUPPORT. It could save a life.
  </div>

  <div class="edit-share">
    Edit &nbsp;|&nbsp; Share
  </div>

</div>
</body>
</html>
