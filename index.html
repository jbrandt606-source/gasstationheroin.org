<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gas Station Heroin</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100%;
  background: #050505;
  color: #fff;
  font-family: Inter, sans-serif;
}

.hero {
  position: relative;
  min-height: 100vh;
  width: 100%;
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(0,0,0,.98) 0%, rgba(0,0,0,.92) 34%, rgba(0,0,0,.45) 62%, rgba(0,0,0,.12) 100%),
    url("herostore.jpeg") center center / cover no-repeat;
}

.hero-inner {
  min-height: 100vh;
  width: 100%;
  max-width: 1500px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  padding: 5vw;
}

.hero-copy {
  width: min(560px, 46vw);
  z-index: 2;
}

h1 {
  font-family: Oswald, Impact, sans-serif;
  text-transform: uppercase;
  line-height: .88;
  letter-spacing: -0.03em;
  margin-bottom: 34px;
}

h1 .white {
  display: block;
  font-size: clamp(4rem, 7vw, 8rem);
  color: #f4f4f4;
}

h1 .red {
  display: block;
  font-size: clamp(4.5rem, 8vw, 9rem);
  color: #b5121b;
}

.subhead {
  border-left: 5px solid #c51624;
  padding-left: 24px;
  max-width: 560px;
  font-size: clamp(1.15rem, 1.8vw, 1.8rem);
  line-height: 1.35;
  color: #f1f1f1;
  margin-bottom: 36px;
}

.bullets {
  list-style: none;
  margin-bottom: 42px;
}

.bullets li {
  display: flex;
  align-items: center;
  gap: 18px;
  margin: 18px 0;
  font-size: clamp(1rem, 1.3vw, 1.25rem);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .02em;
}

.icon {
  width: 54px;
  height: 54px;
  border: 3px solid #c51624;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: #c51624;
  font-size: 1.3rem;
}

.tagline {
  font-family: Oswald, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-size: clamp(1.25rem, 2vw, 2rem);
}

.tagline .red { color: #c51624; }
.tagline .green { color: #67b735; }
.tagline .blue { color: #1e75bd; }
.tagline span { margin-right: 18px; }

/* MOBILE */
@media (max-width: 800px) {
  .hero {
    min-height: 100svh;
    background:
      linear-gradient(180deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,.72) 42%, rgba(0,0,0,.36) 100%),
      url("herostore.jpeg") center top / cover no-repeat;
  }

  .hero-inner {
    min-height: 100svh;
    align-items: flex-start;
    padding: 72px 30px 42px;
  }

  .hero-copy {
    width: 100%;
    max-width: 520px;
  }

  h1 {
    margin-bottom: 26px;
  }

  h1 .white {
    font-size: clamp(3.9rem, 16vw, 6.2rem);
  }

  h1 .red {
    font-size: clamp(4.4rem, 18vw, 7rem);
  }

  .subhead {
    font-size: 1.25rem;
    line-height: 1.35;
    max-width: 92%;
    margin-bottom: 34px;
  }

  .bullets li {
    font-size: 1rem;
    margin: 16px 0;
  }

  .icon {
    width: 46px;
    height: 46px;
    font-size: 1rem;
  }

  .tagline {
    font-size: 1.15rem;
    line-height: 1.7;
  }
}

/* VERY SMALL PHONES */
@media (max-width: 420px) {
  .hero-inner {
    padding: 56px 24px 36px;
  }

  h1 .white {
    font-size: 3.5rem;
  }

  h1 .red {
    font-size: 4rem;
  }

  .subhead {
    font-size: 1.05rem;
  }

  .bullets li {
    font-size: .92rem;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-copy">

      <h1>
        <span class="white">Gas Station</span>
        <span class="red">Heroin</span>
      </h1>

      <p class="subhead">
        Educating parents and communities on what is being sold in gas stations and vape shops across America.
      </p>

      <ul class="bullets">
        <li><span class="icon">◉</span> See what’s really being sold</li>
        <li><span class="icon">!</span> Understand the risks</li>
        <li><span class="icon">◆</span> Protect children & communities</li>
      </ul>

      <div class="tagline">
        <span class="red">Awareness.</span>
        <span class="green">Education.</span>
        <span class="blue">Action.</span>
      </div>

    </div>
  </div>
</section>

</body>
</html>
