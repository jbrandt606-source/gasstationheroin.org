<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Gas Station Heroin — educating parents and communities about dangerous substances sold in gas stations and vape shops across America.">
  <title>Gas Station Heroin | Awareness Campaign</title>
  <!-- Professional condensed sans-serif fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a; /* deep black‑charcoal background, true to nighttime mood */
      font-family: 'Inter', sans-serif;
      line-height: 1.4;
      color: #e5e5e5;
    }

    /* Two‑column cinematic hero */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      width: 100%;
      margin: 0 auto;
      background: #0a0a0a;
    }

    /* LEFT SIDE — editorial typography, distressed grit texture */
    .hero-left {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 3rem 3rem 4rem;
      background: #0a0a0a;
      z-index: 2;
      overflow: hidden;
    }

    /* Distressed/gritty texture overlay (only on left side, subtle) */
    .hero-left::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.07'/%3E%3C/svg%3E");
      background-repeat: repeat;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: multiply;
    }

    /* Text content layer */
    .hero-left-content {
      position: relative;
      z-index: 2;
      max-width: 540px;
    }

    /* Stacked headline — bold condensed sans, gritty, no glow */
    .headline {
      font-family: 'Oswald', 'Impact', 'Arial Black', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin-bottom: 1.8rem;
    }

    .gas-station {
      font-size: clamp(3rem, 10vw, 5.8rem);
      color: #ffffff;
      display: block;
      text-shadow: none;
    }

    .heroin {
      font-size: clamp(3rem, 10vw, 6rem);
      color: #b1202a;   /* deep, rich red — no neon */
      display: block;
      margin-top: -0.15em;
      text-shadow: none;
    }

    /* Subtitle — clean, readable */
    .subhead {
      font-size: 1.1rem;
      line-height: 1.4;
      font-weight: 500;
      color: #cfcfcf;
      margin-bottom: 2rem;
      max-width: 480px;
      border-left: 3px solid #b1202a;
      padding-left: 1rem;
    }

    /* Three bullet points with subtle icons — editorial, minimal */
    .bullet-list {
      list-style: none;
      margin-bottom: 2.5rem;
    }
    .bullet-list li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 500;
      color: #ececec;
    }
    .bullet-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      color: #b1202a;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    /* No floating or oversized icons; clean inline */

    /* Bottom tagline: AWARENESS. | EDUCATION. | ACTION. */
    .tagline {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 1.5px;
      color: #ffffff;
      text-transform: uppercase;
      border-top: 1px solid rgba(180, 180, 180, 0.25);
      padding-top: 1.5rem;
      display: inline-block;
    }
    .tagline span {
      color: #b1202a;
      font-weight: 700;
    }
    .separator {
      margin: 0 4px;
      color: #888;
    }

    /* RIGHT SIDE — storefront photo with realistic, cinematic treatment */
    .hero-right {
      position: relative;
      background: #000;
      overflow: hidden;
      min-height: 100%;
    }
    .hero-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 35% 25%; /* Fine‑tuned to preserve KRATOM window lettering and smoke shop signage */
      display: block;
      transition: all 0.2s ease;
    }

    /* Subtle cinematic overlay: dark moody gradient + wet reflection feel (preserves sign details) */
    .hero-right::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Ensure storefront details (KRATOM, smoke shop) are not obscured by heavy overlay */
    /* The overlay adds contrast without losing readability of signage */

    /* RESPONSIVE: maintain two column integrity, then stack on mobile */
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
      .hero-left {
        padding: 3rem 2rem;
        order: 1;
      }
      .hero-left-content {
        max-width: 100%;
      }
      .hero-right {
        order: 2;
        min-height: 55vh;
      }
      .hero-right img {
        object-position: 35% 20%; /* keep signage visible on mobile */
      }
      .subhead {
        max-width: 100%;
      }
    }

    @media (max-width: 580px) {
      .hero-left {
        padding: 2rem 1.5rem;
      }
      .bullet-list li {
        font-size: 0.9rem;
      }
      .tagline {
        font-size: 1rem;
      }
    }

    /* No glowing text, no neon borders, no floating pills/cards – checked */
    /* Distressed texture only on left side background; text remains crisp but gritty background adds editorial feel */
    /* Maintain perfect alignment, no blur on storefront, no distortion */
  </style>
</head>
<body>
  <section class="hero">
    <!-- LEFT COLUMN: editorial copy -->
    <div class="hero-left">
      <div class="hero-left-content">
        <div class="headline">
          <span class="gas-station">GAS STATION</span>
          <span class="heroin">HEROIN</span>
        </div>
        <div class="subhead">
          Educating parents and communities on what is being sold in gas stations and vape shops across America.
        </div>
        <ul class="bullet-list">
          <li>
            <span class="bullet-icon">👁️</span>
            <span>See what’s really being sold</span>
          </li>
          <li>
            <span class="bullet-icon">⚠️</span>
            <span>Understand the risks</span>
          </li>
          <li>
            <span class="bullet-icon">🛡️</span>
            <span>Protect children & communities</span>
          </li>
        </ul>
        <div class="tagline">
          AWARENESS.<span class="separator"> | </span>EDUCATION.<span class="separator"> | </span>ACTION.
        </div>
      </div>
    </div>

    <!-- RIGHT COLUMN: realistic storefront photo (herostore.jpeg) preserving KRATOM lettering, smoke shop signage -->
    <div class="hero-right">
      <img src="herostore.jpeg" alt="Gas station and smoke shop storefront with KRATOM signage, reflective pavement, nighttime atmosphere" onerror="this.onerror=null; this.alt='Storefront image placeholder – real campaign visual';">
    </div>
  </section>
</body>
</html>
