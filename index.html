<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Gas Station Heroin</title>

<meta name="description" content="Educating parents and communities on what is being sold in gas stations and vape shops across America." />

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#050505;
  overflow-x:hidden;
  font-family:'Inter',sans-serif;
  color:#fff;
}

/* =========================
   HERO
========================= */

.hero{
  position:relative;
  width:100%;
  min-height:100vh;

  background:
    linear-gradient(
      90deg,
      rgba(0,0,0,.97) 0%,
      rgba(0,0,0,.92) 34%,
      rgba(0,0,0,.48) 62%,
      rgba(0,0,0,.15) 100%
    ),
    url('herostore.jpeg') center center / cover no-repeat;

  overflow:hidden;
}

/* subtle cinematic texture */

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.02) 0%, transparent 65%);
  pointer-events:none;
}

.hero-inner{
  position:relative;
  z-index:2;

  width:100%;
  min-height:100vh;

  display:flex;
  align-items:center;

  max-width:1600px;
  margin:0 auto;

  padding:5vw;
}

.hero-copy{
  width:min(560px,46vw);
}

/* =========================
   TITLE
========================= */

.hero-title{
  margin-bottom:34px;

  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  line-height:.88;
  letter-spacing:-0.04em;
}

.hero-title .white{
  display:block;
  color:#f4f4f4;
  font-size:clamp(4rem,7vw,8rem);
  font-weight:700;
}

.hero-title .red{
  display:block;
  color:#bb1322;
  font-size:clamp(4.5rem,8vw,9rem);
  font-weight:700;
}

/* =========================
   SUBHEAD
========================= */

.subhead{
  max-width:560px;

  border-left:5px solid #c51624;

  padding-left:24px;
  margin-bottom:42px;

  font-size:clamp(1.15rem,1.6vw,1.7rem);
  line-height:1.35;
  font-weight:500;

  color:#ededed;
}

/* =========================
   BULLETS
========================= */

.bullets{
  list-style:none;
  margin-bottom:44px;
}

.bullets li{
  display:flex;
  align-items:center;
  gap:18px;

  margin:18px 0;

  font-size:clamp(1rem,1.3vw,1.25rem);
  font-weight:700;

  text-transform:uppercase;
  letter-spacing:.02em;
}

.icon{
  width:54px;
  height:54px;
  min-width:54px;

  border:3px solid #c51624;
  border-radius:50%;

  display:grid;
  place-items:center;

  color:#c51624;

  font-size:1.15rem;
  font-weight:700;
}

/* =========================
   TAGLINE
========================= */

.tagline{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  font-size:clamp(1.2rem,2vw,2rem);
  letter-spacing:.08em;
  font-weight:700;
}

.tagline .red{
  color:#c51624;
}

.tagline .green{
  color:#67b735;
}

.tagline .blue{
  color:#1f77d0;
}

.tagline span{
  margin-right:16px;
}

/* =========================
   TABLET
========================= */

@media(max-width:1100px){

  .hero{
    background:
      linear-gradient(
        180deg,
        rgba(0,0,0,.92) 0%,
        rgba(0,0,0,.78) 42%,
        rgba(0,0,0,.45) 100%
      ),
      url('herostore.jpeg') center top / cover no-repeat;
  }

  .hero-inner{
    align-items:flex-start;
    padding:72px 42px 50px;
  }

  .hero-copy{
    width:100%;
    max-width:720px;
  }

}

/* =========================
   MOBILE PORTRAIT
========================= */

@media(max-width:800px) and (orientation:portrait){

  .hero{
    min-height:100svh;

    background:
      linear-gradient(
        180deg,
        rgba(0,0,0,.94) 0%,
        rgba(0,0,0,.88) 38%,
        rgba(0,0,0,.58) 68%,
        rgba(0,0,0,.32) 100%
      ),
      url('herostore.jpeg') center top / cover no-repeat;
  }

  .hero-inner{
    min-height:100svh;

    align-items:flex-start;

    padding:
      max(60px, env(safe-area-inset-top))
      28px
      36px;
  }

  .hero-copy{
    width:100%;
    max-width:100%;
  }

  .hero-title{
    margin-bottom:24px;
  }

  .hero-title .white{
    font-size:clamp(3rem,13vw,4.6rem);
    line-height:.9;
  }

  .hero-title .red{
    font-size:clamp(3.3rem,14vw,5rem);
    line-height:.88;
  }

  .subhead{
    max-width:94%;

    font-size:1.02rem;
    line-height:1.34;

    padding-left:18px;

    margin-bottom:28px;
  }

  .bullets{
    margin-bottom:28px;
  }

  .bullets li{
    gap:14px;

    margin:14px 0;

    font-size:.88rem;
    line-height:1.2;
  }

  .icon{
    width:42px;
    height:42px;
    min-width:42px;

    font-size:.9rem;
  }

  .tagline{
    font-size:.95rem;
    line-height:1.6;
  }

  .tagline span{
    margin-right:10px;
  }

}

/* =========================
   SMALL PHONES
========================= */

@media(max-width:420px){

  .hero-inner{
    padding:
      max(56px, env(safe-area-inset-top))
      22px
      30px;
  }

  .hero-title .white{
    font-size:3.1rem;
  }

  .hero-title .red{
    font-size:3.7rem;
  }

  .subhead{
    font-size:.98rem;
  }

  .bullets li{
    font-size:.82rem;
  }

  .tagline{
    font-size:.82rem;
  }

}

</style>
</head>

<body>

<section class="hero">

  <div class="hero-inner">

    <div class="hero-copy">

      <h1 class="hero-title">
        <span class="white">Gas Station</span>
        <span class="red">Heroin</span>
      </h1>

      <p class="subhead">
        Educating parents and communities on what is being sold in gas stations and vape shops across America.
      </p>

      <ul class="bullets">

        <li>
          <span class="icon">◉</span>
          See what’s really being sold
        </li>

        <li>
          <span class="icon">!</span>
          Understand the risks
        </li>

        <li>
          <span class="icon">◆</span>
          Protect children & communities
        </li>

      </ul>

      <div class="tagline">
        <span class="red">Awareness.</span>
        <span class="green">Education.</span>
        <span class="blue">Action.</span>
      </div>

    </div>

  </div>

</section>

</body>
</html>
