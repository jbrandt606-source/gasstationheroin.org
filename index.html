<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gas Station Heroin</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  color:#fff;
  font-family:Inter,sans-serif;
}

.hero{
  width:100%;
  min-height:100vh;
  background:
    linear-gradient(90deg,rgba(0,0,0,.95) 0%,rgba(0,0,0,.85) 34%,rgba(0,0,0,.25) 62%,rgba(0,0,0,0) 100%),
    url("herostore.jpeg") center center/cover no-repeat;
  display:flex;
  align-items:center;
}

.hero-content{
  width:42%;
  padding-left:4vw;
}

h1{
  font-family:Oswald,sans-serif;
  text-transform:uppercase;
  line-height:.88;
  letter-spacing:-.04em;
  margin-bottom:1.4rem;
}

.white{
  display:block;
  font-size:clamp(4rem,7vw,8rem);
  color:#fff;
}

.red{
  display:block;
  font-size:clamp(4.5rem,8vw,9rem);
  color:#b5121b;
}

.subhead{
  border-left:4px solid #d71920;
  padding-left:1rem;
  font-size:clamp(1rem,1.5vw,1.45rem);
  line-height:1.35;
  margin-bottom:1.4rem;
}

ul{
  list-style:none;
  margin-bottom:1.6rem;
}

li{
  display:flex;
  align-items:center;
  gap:.8rem;
  margin:.65rem 0;
  font-weight:700;
  text-transform:uppercase;
  font-size:clamp(.8rem,1vw,1rem);
}

.icon{
  width:36px;
  height:36px;
  border:2px solid #d71920;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:#d71920;
}

.tagline{
  font-family:Oswald,sans-serif;
  font-size:clamp(1rem,1.5vw,1.5rem);
  text-transform:uppercase;
  letter-spacing:.06em;
  font-weight:700;
}

.tagline span{margin-right:.6rem}
.r{color:#d71920}
.g{color:#67b735}
.b{color:#1f77d0}

/* PHONE PORTRAIT — keep it as a WIDE HERO, scaled down */
@media(max-width:800px) and (orientation:portrait){
  body{
    background:#000;
  }

  .hero{
    min-height:auto;
    height:auto;
    aspect-ratio:16/9;
    margin-top:34vh;

    background:
      linear-gradient(90deg,rgba(0,0,0,.96) 0%,rgba(0,0,0,.82) 36%,rgba(0,0,0,.22) 62%,rgba(0,0,0,0) 100%),
      url("herostore.jpeg") center center/cover no-repeat;

    align-items:center;
  }

  .hero-content{
    width:39%;
    padding-left:3.4vw;
  }

  h1{
    margin-bottom:.45rem;
  }

  .white{
    font-size:8.8vw;
  }

  .red{
    font-size:9.8vw;
  }

  .subhead{
    border-left:2px solid #d71920;
    padding-left:.45rem;
    font-size:2.15vw;
    line-height:1.25;
    margin-bottom:.55rem;
  }

  ul{
    margin-bottom:.65rem;
  }

  li{
    gap:.35rem;
    margin:.25rem 0;
    font-size:1.85vw;
    line-height:1.15;
  }

  .icon{
    width:4.4vw;
    height:4.4vw;
    min-width:4.4vw;
    border-width:1.5px;
    font-size:1.5vw;
  }

  .tagline{
    font-size:2.25vw;
    letter-spacing:.04em;
  }

  .tagline span{
    margin-right:.28rem;
  }
}

/* LANDSCAPE / DESKTOP MOBILE */
@media(max-width:900px) and (orientation:landscape){
  .hero{
    min-height:100vh;
  }

  .hero-content{
    width:42%;
  }

  .white{font-size:8vw}
  .red{font-size:9vw}
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1>
      <span class="white">Gas Station</span>
      <span class="red">Heroin</span>
    </h1>

    <p class="subhead">
      Educating parents and communities on what is being sold in gas stations and vape shops across America.
    </p>

    <ul>
      <li><span class="icon">◉</span> See what’s really being sold</li>
      <li><span class="icon">!</span> Understand the risks</li>
      <li><span class="icon">◆</span> Protect our children & communities</li>
    </ul>

    <div class="tagline">
      <span class="r">Awareness.</span>
      <span class="g">Education.</span>
      <span class="b">Action.</span>
    </div>
  </div>
</section>

</body>
</html>
